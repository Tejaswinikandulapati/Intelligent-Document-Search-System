<!DOCTYPE html>
<html>

<head>

<title>Intelligent Document Search System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Segoe UI',sans-serif;

background:linear-gradient(
135deg,
#eef2ff,
#f8fafc
);

min-height:100vh;

padding:40px;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:850px;

background:white;

padding:35px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

h1{

text-align:center;

color:#1e3a8a;

margin-bottom:25px;

font-size:34px;

}

form{

text-align:center;

margin-bottom:25px;

}

input{

width:300px;

padding:14px;

margin:10px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:16px;

outline:none;

}

input:focus{

border-color:#2563eb;

box-shadow:0 0 8px rgba(37,99,235,0.3);

}

button{

padding:14px 26px;

background:linear-gradient(
135deg,
#2563eb,
#4f46e5
);

color:white;

border:none;

border-radius:12px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 6px 18px rgba(37,99,235,0.3);

}

.message{

text-align:center;

font-size:18px;

font-weight:bold;

margin-bottom:20px;

color:#dc2626;

}

.search-title{

font-size:28px;

color:#312e81;

margin-bottom:15px;

text-align:center;

}

.result{

background:#f8fafc;

padding:20px;

margin-top:18px;

border-radius:18px;

border-left:6px solid #2563eb;

box-shadow:0 4px 10px rgba(0,0,0,0.05);

}

.result h3{

color:#1d4ed8;

margin-bottom:10px;

}

.result p{

font-size:17px;

line-height:1.7;

color:#334155;

}

mark{

background:#fde68a;

padding:3px 6px;

border-radius:5px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<h1>
Intelligent Document Search System
</h1>

<form method="POST" enctype="multipart/form-data">

<input
type="file"
name="file">

<br>

<input
type="text"
name="keyword"
placeholder="Enter keyword">

<br>

<button>
Upload & Search
</button>

</form>

<div class="message">

{{message}}

</div>

<h2 class="search-title">

Search Results

</h2>

{% for file in results %}

<div class="result">

<h3>

{{file.name}}

</h3>

<p>

{{file.content|safe}}

</p>

</div>

{% endfor %}

</div>

</body>

</html>
